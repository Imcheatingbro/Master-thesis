# Cross-platform conda environment for the thesis demo pipeline.
# Tested workflow:
#   conda env create -f environment.yml
#   conda activate Master_thesis
#   python -m ipykernel install --user --name Master_thesis --display-name Master_thesis
name: Master_thesis
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - openai>=2,<3
      - pyyaml>=6,<7
      - numpy>=2,<3
      - rapidfuzz>=3,<4
      - datasets>=4,<5
      - sentence-transformers>=5,<6
      - torch>=2,<3
      - tqdm>=4,<5
      - ipykernel>=7,<8
      - notebook>=7,<8
      - ipywidgets>=8,<9
      - pytest>=9,<10
      - pandas>=3,<4
      - scikit-learn>=1,<2
